apiVersion: apps/v1
kind: Deployment
metadata:
  name: orbit-api
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: orbit-api
    app.kubernetes.io/instance: dev
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: orbit-platform
    app.kubernetes.io/managed-by: Helm
    orbit.dev/environment: dev
    version: v1
spec:
  replicas: {{ .Values.replicaCount }}

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: orbit-api
      app.kubernetes.io/instance: dev

  template:
    metadata:
      labels:
        app.kubernetes.io/name: orbit-api
        app.kubernetes.io/instance: dev
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: orbit-platform
        app.kubernetes.io/managed-by: Helm
        orbit.dev/environment: dev
        version: v1
      annotations:
          prometheus.istio.io/merge-metrics: "true"
          prometheus.io/scrape: "true"
          prometheus.io/path: "/metrics"
          prometheus.io/port: "8080"

    spec:
      serviceAccountName: orbit-api
      containers:
        - name: orbit-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}

          envFrom:
            - configMapRef:
                name: orbit-api-config

            - secretRef:
                name: orbit-api-secret

          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}

          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          